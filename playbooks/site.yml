---
# Play 1: Test bien group_vars (demo Variables)
- name: Test global variables
  hosts: all
  gather_facts: false
  tasks:
    - name: Test network zones
      debug:
        var: network_zones
    - name: Test firewall log level
      debug:
        var: firewall_log_level

# Play 2: Deploy MySQL len node2 TRUOC
- name: Deploy MySQL Database Server (node2)
  hosts: db
  become: true
  roles:
    - docker
    - mysql
    - security

# Play 3: Deploy Flask + Nginx len node1 SAU khi DB san sang
- name: Deploy Flask App + Nginx (node1)
  hosts: web
  become: true
  roles:
    - docker
    - webapp
    - nginx_service
    - security
