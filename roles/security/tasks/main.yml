---
- name: Install UFW
  apt:
    name:         ufw
    state:        present
    update_cache: true

- name: Allow OpenSSH
  ufw:
    rule: allow
    name: OpenSSH

# Demo tinh nang Loop: thay 3 task rieng le bang 1 task vong lap
- name: Allow cac port web (Loop)
  ufw:
    rule:  allow
    port:  "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - { port: "80",  proto: tcp }
    - { port: "443", proto: tcp }
    - { port: "8080", proto: tcp }
  # Demo tinh nang When: chi chay tren web node
  when: inventory_hostname in groups['web']

# Chi mo port 3306 tren DB node, chi cho web node ket noi
- name: Allow MySQL port 3306 tu web node (When)
  ufw:
    rule:    allow
    port:    "3306"
    proto:   tcp
    from_ip: "{{ web_node_ip }}"
  when: inventory_hostname in groups['db']

- name: Enable UFW
  ufw:
    state:  enabled
    policy: deny
